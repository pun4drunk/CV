name: Sync labels

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/sync-labels.yml'
      - '.github/scripts/sync_labels.py'

# Labels use the Issues API. If Issues are disabled, the API returns 403 — we
# detect that via repos.get and skip. For 403 with Issues on, set repo/org
# Settings → Actions → Workflow permissions → Read and write.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check whether Issues are enabled
        id: repo
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.setOutput('has_issues', data.has_issues ? 'true' : 'false');

      - name: Set up Python
        if: steps.repo.outputs.has_issues == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        if: steps.repo.outputs.has_issues == 'true'
        run: pip install 'PyYAML>=6,<7'

      - name: Sync labels (REST API)
        if: steps.repo.outputs.has_issues == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/sync_labels.py

      - name: Issues disabled — skip
        if: steps.repo.outputs.has_issues != 'true'
        run: |
          echo "Issues are disabled for this repository; label sync is skipped."
          echo "Enable Issues under Settings → General → Features, then re-run."
